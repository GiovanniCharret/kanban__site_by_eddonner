<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kanban MVP Backend</title>
    <style>
      :root {
        --accent-yellow: #ecad0a;
        --blue-primary: #209dd7;
        --purple-secondary: #753991;
        --dark-navy: #032147;
        --gray-text: #888888;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #fff8e4 0%, #eef7fd 50%, #f4ecfa 100%);
        color: var(--dark-navy);
      }

      main {
        max-width: 720px;
        margin: 0 auto;
        padding: 72px 24px;
      }

      .eyebrow {
        margin: 0 0 12px;
        color: var(--blue-primary);
        font-size: 0.9rem;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0 0 16px;
        font-size: clamp(2.5rem, 5vw, 4rem);
        line-height: 1;
      }

      p {
        margin: 0 0 20px;
        color: var(--gray-text);
        font-size: 1.05rem;
        line-height: 1.6;
      }

      code {
        display: inline-block;
        padding: 2px 8px;
        border-radius: 999px;
        background: rgba(3, 33, 71, 0.08);
        color: var(--dark-navy);
      }

      .card {
        margin-top: 32px;
        padding: 24px;
        border: 2px solid rgba(32, 157, 215, 0.18);
        border-radius: 20px;
        background: rgba(255, 255, 255, 0.88);
        box-shadow: 0 18px 50px rgba(3, 33, 71, 0.08);
      }

      .status {
        color: var(--purple-secondary);
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <main>
      <p class="eyebrow">Phase 2 Scaffold</p>
      <h1>Kanban backend is running</h1>
      <p>
        This temporary page proves that FastAPI is serving HTML from the container.
        The frontend demo will replace this in the next phase.
      </p>
      <section class="card">
        <p class="status">Hello world confirmed</p>
        <p>Health endpoint: <code>/api/health</code></p>
      </section>
    </main>
  </body>
</html>
